name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux-amd64:
    name: Linux amd64
    runs-on: ubuntu-latest

    steps:
      - name: Install runner packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            git \
            pkg-config \
            tar \
            libsqlite3-dev

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: internal/daemon/ui/package-lock.json

      - name: Install UI dependencies
        working-directory: internal/daemon/ui
        run: npm ci --ignore-scripts

      - name: Build UI
        working-directory: internal/daemon/ui
        run: npm run build

      - name: Format check
        run: |
          make fmt
          git diff --exit-code

      - name: Test
        run: make test

      - name: Vet
        run: make vet

      - name: Build
        env:
          VERSION: ${{ github.ref_name }}
        run: make build

      - name: Package release asset
        if: github.repository == 'dev-idkwhoami/herdlite' && startsWith(github.ref, 'refs/tags/v')
        env:
          VERSION: ${{ github.ref_name }}
          GOOS: linux
          GOARCH: amd64
        run: ./scripts/release.sh

      - name: Upload workflow artifact
        if: github.repository == 'dev-idkwhoami/herdlite' && startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: herdlite-linux-amd64
          path: |
            dist/herdlite-linux-amd64.tar.gz
            dist/herdlite-linux-amd64.tar.gz.sha256

      - name: Publish GitHub release
        if: github.repository == 'dev-idkwhoami/herdlite' && startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" \
              dist/herdlite-linux-amd64.tar.gz \
              dist/herdlite-linux-amd64.tar.gz.sha256 \
              --clobber
            gh release edit "${GITHUB_REF_NAME}" --draft=false --latest
          else
            gh release create "${GITHUB_REF_NAME}" \
              dist/herdlite-linux-amd64.tar.gz \
              dist/herdlite-linux-amd64.tar.gz.sha256 \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
          fi
